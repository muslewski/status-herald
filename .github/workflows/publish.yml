name: Publish to npm

# NPM_TOKEN is set on every fleet repo (see agentic-sage propagate workflow).
# Alternatives: ship-npm (local) · Fleet npm publish on muslewski/agentic-sage.
on:
  push:
    tags:
      - 'v*'
      - 'status-herald-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
