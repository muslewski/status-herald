name: Publish to npm

# Canonical publish paths (no per-repo NPM_TOKEN required):
#   1. Local:  ship-npm                 # or: ship-npm <pkg>  after ship-npm --setup
#   2. Fleet:  gh workflow run "Fleet npm publish" -R muslewski/agentic-sage
#              (only agentic-sage holds NPM_TOKEN; secrets are write-only)
#
# This workflow is manual-only so tag pushes do not fail red without a secret.
# Prefer ship-npm / fleet over re-adding a tag trigger here.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Require NPM_TOKEN (prefer ship-npm / fleet)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::No NPM_TOKEN on this repo. Use one of:"
            echo "  ship-npm                 # local, after ship-npm --setup"
            echo "  gh workflow run 'Fleet npm publish' -R muslewski/agentic-sage"
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
